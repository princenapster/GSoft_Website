<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1b38"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
    <linearGradient id="mark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.06)"/>
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect width="420" height="100" rx="20" fill="url(#bg)"/>

  <!-- Mark background square -->
  <rect x="22" y="22" width="56" height="56" rx="14"
    fill="url(#mark)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Circuit lines -->
  <line x1="32" y1="50" x2="40" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <line x1="60" y1="50" x2="68" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <line x1="50" y1="32" x2="50" y2="38" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <line x1="50" y1="62" x2="50" y2="68" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Circuit nodes -->
  <circle cx="32" cy="50" r="2" fill="rgba(255,255,255,0.25)"/>
  <circle cx="68" cy="50" r="2" fill="rgba(255,255,255,0.25)"/>
  <circle cx="50" cy="32" r="2" fill="rgba(255,255,255,0.25)"/>
  <circle cx="50" cy="68" r="2" fill="rgba(255,255,255,0.25)"/>

  <!-- Red accent dot -->
  <circle cx="64" cy="36" r="3" fill="#e94560" opacity="0.9"/>

  <!-- G letterform -->
  <text x="50" y="60" text-anchor="middle"
    font-family="Segoe UI, system-ui, sans-serif"
    font-size="22" font-weight="900" fill="#ffffff"
    letter-spacing="-1">G</text>

  <!-- Cursor underline -->
  <rect x="42" y="63" width="16" height="2.5" rx="1.2" fill="#e94560"/>

  <!-- G-Soft text -->
  <text x="100" y="46" font-family="Segoe UI, system-ui, sans-serif"
    font-size="22" font-weight="900" fill="#ffffff" letter-spacing="-0.5">
    <tspan fill="#e94560">G-Soft</tspan> Business
  </text>

  <!-- Solutions text -->
  <text x="100" y="64" font-family="Segoe UI, system-ui, sans-serif"
    font-size="16" font-weight="700" fill="rgba(255,255,255,0.6)" letter-spacing="-0.3">Solutions</text>

  <!-- Tagline -->
  <text x="100" y="80" font-family="Segoe UI, system-ui, sans-serif"
    font-size="8.5" font-weight="600" fill="rgba(255,255,255,0.4)" letter-spacing="2.5"
    text-transform="uppercase">Solutions with Purpose.</text>
</svg>